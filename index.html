<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云枢工作室 | 专注独立游戏开发</title>
    <!-- 极简版Tailwind，确保加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ins: {
                            white: '#FCFCFC',
                            beige: '#F8F4EE',
                            gray: '#EDECEA',
                            accent: '#C8D9E6',
                            accentHover: '#B0C8D8',
                            text: '#444444',
                            textLight: '#666666'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 全局基础样式，确保所有内容默认显示 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #FCFCFC;
            color: #444444;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
        }
        /* 卡片样式 */
        .game-card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }
        .game-card:hover {
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.07);
            transform: translateY(-3px);
            transition: all 0.3s ease;
        }
        /* 响应式导航 */
        .nav-menu {
            display: flex;
            gap: 24px;
        }
        .hamburger {
            display: none;
        }
        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }
            .hamburger {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- 头部导航 -->
    <header class="sticky top-0 z-50 bg-ins-white border-b border-ins-gray py-3 px-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-lg font-medium text-ins-text">云枢工作室</div>
            <!-- 汉堡菜单（移动端） -->
            <div class="hamburger text-ins-text">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>
            <!-- 导航菜单 -->
            <ul class="nav-menu">
                <li><a href="#home" class="text-ins-text hover:text-ins-accent">首页</a></li>
                <li><a href="#games" class="text-ins-text hover:text-ins-accent">游戏作品</a></li>
                <li><a href="#about" class="text-ins-text hover:text-ins-accent">关于我们</a></li>
                <li><a href="#contact" class="text-ins-text hover:text-ins-accent">联系我们</a></li>
            </ul>
        </div>
    </header>

    <main>
        <!-- 首页Banner（强制显示，移除渐显） -->
        <section id="home" class="py-16 bg-ins-beige px-4">
            <div class="container mx-auto text-center">
                <h1 class="text-3xl md:text-4xl font-light mb-6">
                    独立游戏的<span class="text-ins-accent">温度与创意</span>
                </h1>
                <p class="text-lg text-ins-textLight max-w-2xl mx-auto mb-8">
                    用简单的设计，做有温度的独立游戏
                </p>
                <button class="bg-ins-accent hover:bg-ins-accentHover text-white px-8 py-2 rounded-full cursor-pointer">
                    查看我们的作品
                </button>
            </div>
        </section>

        <!-- 游戏作品（强制显示，简化布局） -->
        <section id="games" class="py-16 px-4">
            <div class="container mx-auto">
                <h2 class="text-2xl font-light mb-12 text-center text-ins-text">我们的游戏作品</h2>
                <!-- 简化网格布局，确保卡片显示 -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- 游戏卡片1 -->
                    <div class="game-card">
                        <img src="https://picsum.photos/600/400?random=1" alt="游戏名称1封面" class="w-full h-48 object-cover rounded-md mb-4">
                        <h3 class="text-xl font-medium mb-2 text-ins-text">游戏名称1</h3>
                        <p class="text-ins-textLight mb-4">简约风格的休闲独立游戏</p>
                        <a href="game-detail.html?game=1" class="text-ins-accent hover:underline inline-flex items-center gap-1">
                            查看详情 
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                    <!-- 游戏卡片2 -->
                    <div class="game-card">
                        <img src="https://picsum.photos/600/400?random=2" alt="游戏名称2封面" class="w-full h-48 object-cover rounded-md mb-4">
                        <h3 class="text-xl font-medium mb-2 text-ins-text">游戏名称2</h3>
                        <p class="text-ins-textLight mb-4">像素风格的冒险独立游戏</p>
                        <a href="game-detail.html?game=2" class="text-ins-accent hover:underline inline-flex items-center gap-1">
                            查看详情 
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                    <!-- 游戏卡片3 -->
                    <div class="game-card">
                        <img src="https://picsum.photos/600/400?random=3" alt="游戏名称3封面" class="w-full h-48 object-cover rounded-md mb-4">
                        <h3 class="text-xl font-medium mb-2 text-ins-text">游戏名称3</h3>
                        <p class="text-ins-textLight mb-4">解谜风格的剧情独立游戏</p>
                        <a href="game-detail.html?game=3" class="text-ins-accent hover:underline inline-flex items-center gap-1">
                            查看详情 
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- 关于我们 -->
        <section id="about" class="py-16 bg-ins-beige px-4">
            <div class="container mx-auto max-w-3xl">
                <h2 class="text-2xl font-light mb-12 text-center text-ins-text">关于我们</h2>
                <p class="text-ins-textLight mb-6">
                    我们是一家专注于独立游戏开发的工作室，由热爱游戏的开发者组成，坚持打造有温度的游戏作品。
                </p>
                <p class="text-ins-textLight">
                    用代码和创意，探索游戏的无限可能。
                </p>
            </div>
        </section>

        <!-- 联系我们 -->
        <section id="contact" class="py-16 px-4">
            <div class="container mx-auto max-w-xl">
                <h2 class="text-2xl font-light mb-12 text-center text-ins-text">联系我们</h2>
                <form id="contactForm" class="bg-white p-8 rounded-lg shadow-md">
                    <div class="mb-4">
                        <label for="name" class="block text-ins-text mb-2">姓名</label>
                        <input type="text" id="name" name="name" class="w-full px-4 py-2 border border-ins-gray rounded-md" required>
                    </div>
                    <div class="mb-4">
                        <label for="email" class="block text-ins-text mb-2">邮箱</label>
                        <input type="email" id="email" name="email" class="w-full px-4 py-2 border border-ins-gray rounded-md" required>
                    </div>
                    <div class="mb-6">
                        <label for="message" class="block text-ins-text mb-2">留言</label>
                        <textarea id="message" name="message" rows="4" class="w-full px-4 py-2 border border-ins-gray rounded-md" required></textarea>
                    </div>
                    <button type="submit" class="w-full bg-ins-accent hover:bg-ins-accentHover text-white py-2 rounded-md cursor-pointer">
                        发送留言
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="bg-ins-gray py-6 border-t border-ins-beige px-4">
        <div class="container mx-auto text-center text-ins-textLight">
            <p>© 2026 云枢工作室 - 保留所有权利</p>
        </div>
    </footer>

    <!-- 极简脚本，只保留表单功能 -->
    <script>
        // 表单提交提示
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('留言提交成功！我们会尽快回复你～');
            this.reset();
        });
    </script>
</body>
</html>
